spring:
  application:
    name: exp-cards
    version: 1.0.0
    description: Experience layer service for card management journeys
    team:
      name: Firefly Software Foundation
      email: dev@getfirefly.io

  threads:
    virtual:
      enabled: true

  # ---- DEMO ONLY: Redis disabled. Restore the block below when Redis is reachable. ----
  # data:
  #   redis:
  #     host: ${REDIS_HOST:localhost}
  #     port: ${REDIS_PORT:6379}
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration

firefly:
  orchestration:
    # ---- DEMO ONLY: workflow state kept in-memory. Restore the Redis settings below for clustered deployments. ----
    persistence:
      provider: in-memory
      # provider: redis
      # key-prefix: "exp-cards:"
      # key-ttl: 72h
      # retention-period: 30d
      # cleanup-interval: 6h
    recovery:
      enabled: false
      # enabled: true
      # stale-threshold: 1h

  # ---- DEMO ONLY: idempotency cache forced to Caffeine so the AUTO resolver does NOT pick Redis. ----
  cache:
    enabled: true
    default-cache-type: CAFFEINE
    redis:
      enabled: false

  cqrs:
    enabled: true
    command:
      timeout: 30s
      metrics-enabled: true
      tracing-enabled: true
    query:
      timeout: 15s
      caching-enabled: true
      cache-ttl: 5m
      metrics-enabled: true
      tracing-enabled: true

  stepevents:
    enabled: true

api-configuration:
  domain-platform:
    banking-cards:
      base-path: ${ENDPOINT_DOMAIN_BANKING_CARDS:http://localhost:8091}
      timeout: 10s
    common-notifications:
      base-path: ${ENDPOINT_DOMAIN_COMMON_NOTIFICATIONS:http://localhost:8082}
      timeout: 5s

server:
  address: ${SERVER_ADDRESS:localhost}
  port: ${SERVER_PORT:8101}
  shutdown: graceful

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tagsSorter: alpha
    operationsSorter: method
    docExpansion: none
    filter: true
  packages-to-scan: com.firefly.experience.cards.web.controllers
  paths-to-match: /api/**

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

logging:
  level:
    root: INFO
    com.firefly.experience.cards: DEBUG
    org.fireflyframework: DEBUG

---
spring:
  config:
    activate:
      on-profile: openapi
  main:
    web-application-type: reactive

server:
  port: 18080

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs

logging:
  level:
    root: WARN
    org.springframework: WARN

---
spring:
  config:
    activate:
      on-profile: dev

logging:
  level:
    com.firefly: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod

logging:
  level:
    com.firefly: INFO

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
